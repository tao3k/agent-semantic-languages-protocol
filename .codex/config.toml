[features]
unified_exec = true

# BEGIN semantic-agent-hook agent hooks
# Generated by `semantic-agent-hook install --client codex`.
# Root dispatcher for language-owned semantic hook profiles.

[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"

[[hooks.SessionStart.hooks]]
type = "command"
timeout = 5
statusMessage = "Loading semantic agent hook profiles"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
hook_bin="$repo_root/.codex/semantic-agent-hook/bin/semantic-agent-hook"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
if [ -x "$hook_bin" ]; then
  exec "$hook_bin" hook --client codex session-start --profiles "$profiles"
fi
exec semantic-agent-hook hook --client codex session-start --profiles "$profiles"
'''

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
timeout = 5
statusMessage = "Planning semantic search flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
hook_bin="$repo_root/.codex/semantic-agent-hook/bin/semantic-agent-hook"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
if [ -x "$hook_bin" ]; then
  exec "$hook_bin" hook --client codex user-prompt --profiles "$profiles"
fi
exec semantic-agent-hook hook --client codex user-prompt --profiles "$profiles"
'''

[[hooks.PreToolUse]]
matcher = ".*(Read|readFile|readDirectory|read_file|FsReadFile|FsReadDirectory|fs\\.read|fs\\.readDirectory|fs/readFile|fs/readDirectory|fs\\.readbin|writeFile|FsWriteFile|fs\\.write|fs/write|fs\\.writeFile|fs/writeFile|FsRemove|fs\\.remove|fs/remove|FsCopy|fs\\.copy|fs/copy|fs\\.rename|fs/rename|mcp__.*__read.*|multi_tool_use\\.parallel|multi_tool_use/parallel|multi_tool_use|Bash|exec_command|command_execution|apply_patch|Edit|Write).*"

[[hooks.PreToolUse.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic search flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
hook_bin="$repo_root/.codex/semantic-agent-hook/bin/semantic-agent-hook"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
if [ -x "$hook_bin" ]; then
  exec "$hook_bin" hook --client codex pre-tool --profiles "$profiles"
fi
exec semantic-agent-hook hook --client codex pre-tool --profiles "$profiles"
'''

[[hooks.PermissionRequest]]
matcher = ".*(Read|readFile|readDirectory|read_file|FsReadFile|FsReadDirectory|fs\\.read|fs\\.readDirectory|fs/readFile|fs/readDirectory|fs\\.readbin|writeFile|FsWriteFile|fs\\.write|fs/write|fs\\.writeFile|fs/writeFile|FsRemove|fs\\.remove|fs/remove|FsCopy|fs\\.copy|fs/copy|fs\\.rename|fs/rename|mcp__.*__read.*|multi_tool_use\\.parallel|multi_tool_use/parallel|multi_tool_use|Bash|exec_command|command_execution|apply_patch|Edit|Write).*"

[[hooks.PermissionRequest.hooks]]
type = "command"
timeout = 5
statusMessage = "Checking semantic approval flow"
command = '''
repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"
hook_bin="$repo_root/.codex/semantic-agent-hook/bin/semantic-agent-hook"
profiles="$repo_root/.codex/semantic-agent-hook/profiles.json"
if [ -x "$hook_bin" ]; then
